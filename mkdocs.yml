site_name: Big Data and AI Trends Market — Minnesota Carlson MSBA
site_url: https://de4liu.github.io/trends/
theme:
  name: material
  favicon: assets/favicon.ico
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  language: en
  palette:
    - scheme: youtube
      toggle:
        icon: material/toggle-switch-off-outline 
        name: Switch to dark mode
      primary: orange
      accent: yellow
    - scheme: slate 
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode    
      primary: orange
      accent: yellow
nav:
    - Home: index.md
    - Spring 2026:
        - Overview: years/2026/index.md
        - Projects: years/2026/projects/index.md
        - Winners: years/2026/winners/index.md
    - Archive:
        - All years: years/index.md
        - Spring 2025:
            - Overview: years/2025/index.md
            - Projects: years/2025/projects/index.md
            - Winners: years/2025/winners/index.md

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - attr_list


copyright: |
  &copy; 2025 <a href="https://github.com/de4liu"  target="_blank" rel="noopener">De Liu</a>